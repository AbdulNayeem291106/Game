<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Happy Birthday Akram</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<!-- START SCREEN -->

<div id="startScreen">

<div class="overlay">

<h1>🎂 Birthday Game 🎂</h1>


<input
id="playerName"
type="text"
placeholder="Enter your name">


<p id="error"></p>


<button onclick="checkName()">

Continue

</button>


</div>

</div>



<!-- GAME SCREEN -->

<div id="gameScreen" style="display:none;">

⭐ Score:

</div>

<div id="road">

</div>


</div>


</div>

<button id="leftBtn">
⬅
</button>


<button id="rightBtn">
➡
</button>


</div>


</div>
